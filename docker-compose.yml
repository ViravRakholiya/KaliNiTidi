version: '3.8'

services:
  blacks-3-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blacks-3-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - blacks-3-network

networks:
  blacks-3-network:
    driver: bridge
